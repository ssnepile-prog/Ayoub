name: Windows RDP
on: [push]
jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1

      - name: Create User
        run: |
          net user rdpuser Password123! /add
          net localgroup administrators rdpuser /add

      - name: Maximum Performance Boost
        run: |
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile" -Name "SystemResponsiveness" -Value 0
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl" -Name "Win32PrioritySeparation" -Value 38
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Services\LanmanWorkstation\Parameters" -Name "DisableBandwidthThrottling" -Value 1
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Services\LanmanWorkstation\Parameters" -Name "DisableLargeMtu" -Value 0

      - name: Gaming CPU Priority
        run: |
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games" -Name "Affinity" -Value 0
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games" -Name "Background Only" -Value "False"
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games" -Name "Clock Rate" -Value 10000
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games" -Name "GPU Priority" -Value 8
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games" -Name "Priority" -Value 6
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games" -Name "Scheduling Category" -Value "High"
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games" -Name "SFIO Priority" -Value "High"

      - name: Disable Game Bar and Xbox Bloat
        run: |
          Set-ItemProperty -Path "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\GameDVR" -Name "AppCaptureEnabled" -Value 0 -ErrorAction SilentlyContinue
          Set-ItemProperty -Path "HKCU:\System\GameConfigStore" -Name "GameDVR_Enabled" -Value 0 -ErrorAction SilentlyContinue
          Stop-Service -Name "XblAuthManager" -Force -ErrorAction SilentlyContinue
          Set-Service -Name "XblAuthManager" -StartupType Disabled -ErrorAction SilentlyContinue
          Stop-Service -Name "XblGameSave" -Force -ErrorAction SilentlyContinue
          Set-Service -Name "XblGameSave" -StartupType Disabled -ErrorAction SilentlyContinue
          Stop-Service -Name "XboxNetApiSvc" -Force -ErrorAction SilentlyContinue
          Set-Service -Name "XboxNetApiSvc" -StartupType Disabled -ErrorAction SilentlyContinue

      - name: Optimize RDP Quality
        run: |
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "ColorDepth" -Value 4
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "fDisableWallpaper" -Value 1
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "fDisableFullWindowDrag" -Value 1
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "fDisableMenuAnims" -Value 1
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "fDisableThemes" -Value 1
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "MaxCompressionLevel" -Value 2

      - name: Disable Useless Services
        run: |
          $services = @("SysMain","WSearch","DiagTrack","RetailDemo","MapsBroker","RemoteRegistry","Fax","PrintSpooler","TabletInputService","WerSvc")
          foreach ($svc in $services) {
            Stop-Service -Name $svc -Force -ErrorAction SilentlyContinue
            Set-Service -Name $svc -StartupType Disabled -ErrorAction SilentlyContinue
          }

      - name: Optimize Visual Effects
        run: |
          $path = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects"
          If (!(Test-Path $path)) { New-Item -Path $path -Force }
          Set-ItemProperty -Path $path -Name "VisualFXSetting" -Value 2
          $path2 = "HKCU:\Control Panel\Desktop"
          Set-ItemProperty -Path $path2 -Name "DragFullWindows" -Value "0"
          Set-ItemProperty -Path $path2 -Name "MenuShowDelay" -Value "0"
          Set-ItemProperty -Path $path2 -Name "UserPreferencesMask" -Value ([byte[]](0x90,0x12,0x03,0x80,0x10,0x00,0x00,0x00))

      - name: Network Optimization
        run: |
          netsh int tcp set global autotuninglevel=normal
          netsh int tcp set global congestionprovider=ctcp
          netsh int tcp set global ecncapability=enabled
          netsh int tcp set global timestamps=disabled
          netsh int tcp set global rss=enabled
          netsh int tcp set global fastopen=enabled
          netsh int tcp set global chimney=enabled
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters" -Name "TcpAckFrequency" -Value 1
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters" -Name "TCPNoDelay" -Value 1

      - name: Setup ngrok
        run: |
          Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip
          .\ngrok\ngrok.exe authtoken 2g94QCIlYC77diTFzyPPb2822aY_4o5r9gPEjdmAD6VANUdMy

      - name: Start tunnel and show address
        run: |
          Start-Process -FilePath ".\ngrok\ngrok.exe" -ArgumentList "tcp 3389" -NoNewWindow
          Start-Sleep -Seconds 5
          $tunnels = Invoke-RestMethod http://localhost:4040/api/tunnels
          Write-Host "==================================="
          Write-Host "RDP Address: $($tunnels.tunnels[0].public_url)"
          Write-Host "Username: rdpuser"
          Write-Host "Password: Password123!"
          Write-Host "==================================="
          Start-Sleep -Seconds 21600
